<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="theme-color" content="#0f766e">
        <title>AfyaNova offline</title>
        <style>
            :root {
                color-scheme: light;
                font-family:
                    Inter, ui-sans-serif, system-ui, -apple-system,
                    BlinkMacSystemFont, "Segoe UI", sans-serif;
                background: #f8fafc;
                color: #0f172a;
            }

            body {
                margin: 0;
                min-height: 100vh;
                display: grid;
                place-items: center;
                padding: 24px;
            }

            main {
                width: min(100%, 520px);
                border: 1px solid #dbe4ea;
                border-radius: 12px;
                background: #ffffff;
                padding: 24px;
                box-shadow: 0 24px 80px rgb(15 23 42 / 10%);
            }

            h1 {
                margin: 0 0 8px;
                font-size: 1.35rem;
                line-height: 1.2;
            }

            p {
                margin: 0;
                color: #475569;
                line-height: 1.6;
            }
        </style>
    </head>
    <body>
        <main>
            <h1>Offline mode</h1>
            <p>
                AfyaNova cannot reach the cloud right now. Return to the open
                Patients tab to continue saved offline registrations, then go
                online to upload them.
            </p>
        </main>
    </body>
</html>
